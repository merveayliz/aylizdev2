<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AylizDev | Canlı & Profesyonel Kimlik</title>
    <link rel="icon" href="icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg-dark: #050505;
            --color-1: #3b82f6; 
            --color-2: #8b5cf6; 
            --color-3: #ef4444; 
            --color-4: #ec4899; 
            --color-5: #f59e0b; 
            --color-6: #10b981; 
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

    
        .ambient-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            animation: float 15s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30vw, 20vh) scale(1.2); }
            66% { transform: translate(-20vw, 40vh) scale(0.8); }
            100% { transform: translate(10vw, -10vh) scale(1.1); }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3.5rem;
            padding: 4rem 3rem;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
            max-width: 480px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .profile-icon-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            position: relative;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, var(--color-1), var(--color-4), var(--color-5));
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        .profile-icon-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover; 
            border: 2px solid var(--bg-dark);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

       
        .name-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, var(--color-1), var(--color-4), var(--color-5), var(--color-6));
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textFlow 4s linear infinite;
        }

        @keyframes textFlow {
            to { background-position: 200% center; }
        }

        
        .status-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--color-6);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--color-6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .action-btn {
            margin-top: 3rem;
            width: 100%;
            padding: 1.4rem;
            border-radius: 2rem;
            background: linear-gradient(to right, var(--color-1), var(--color-2), var(--color-4));
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 170%;
            max-width: 500px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid transparent; 
            background-image: linear-gradient(#0f0f0f, #0f0f0f), linear-gradient(45deg, var(--color-1), var(--color-4), var(--color-5));
            background-origin: border-box;
            background-clip: content-box, border-box;
            border-radius: 2.5rem;
            padding: 1rem; 
            z-index: 100;
            box-shadow: 0 0 80px rgba(0,0,0,0.9);
            animation: modalIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 16, 16, 0.85) transparent;
            backdrop-filter: blur(10px);
            z-index: 90;
        }

        .link-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.2rem;
            border-radius: 1rem;
            display: block;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .link-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(10px);
            border-color: var(--color-2);
        }

         @media (max-width: 1023px) {
            .main-card {
                width: 90%;
                padding: 2.5rem 1.5rem;
                border-radius: 2.5rem;
            }
            .profile-icon-container {
                width: 90px;
                height: 90px;
                margin-bottom: 1rem;
            }
            .name-text {
                font-size: 3rem; 
                letter-spacing: -2px;
            }
            .status-badge {
                font-size: 0.7rem;
                padding: 0.4rem 0.8rem;
            }
            .action-btn {
                padding: 1rem;
                font-size: 0.95rem;
            }
        }

    </style>
</head>
<body>

    <div class="ambient-glow">
        <div class="orb" style="width: 500px; height: 500px; background: var(--color-1); top: -10%; left: -10%; animation-delay: 0s;"></div>
        <div class="orb" style="width: 450px; height: 450px; background: var(--color-4); bottom: -10%; right: -10%; animation-delay: -5s;"></div>
        <div class="orb" style="width: 350px; height: 350px; background: var(--color-5); top: 30%; right: 20%; animation-delay: -10s;"></div>
        <div class="orb" style="width: 300px; height: 300px; background: var(--color-6); bottom: 20%; left: 15%; animation-delay: -2s;"></div>
    </div>

    <div class="main-card">
        <div class="status-badge mb-6">
            <span class="status-dot"></span>
            AylizDev / Full Stack Developer
        </div>


        <h1 class="name-text">AylizDev</h1>
        
        <p class="text-gray-400 text-lg font-medium px-4">
            Kodun sanatla, tasarımın tutkuyla buluştuğu dijital evren.
        </p>

        <button class="action-btn" onclick="openModal()">
            <span>Beni Tanı</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
    </div>

    <div class="overlay" id="overlay" onclick="closeModal()"></div>
    
    <div class="modal" id="modal">
        <h2 class="text-3xl font-extrabold mb-6 bg-gradient-to-r from-blue-400 to-pink-500 bg-clip-text text-transparent text-center">Keşfet</h2>
        
        <div class="space-y-4">
            <a href="https://github.com/merveayliz" target="_blank" class="link-card">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-blue-500/20 rounded-xl text-blue-400">🚀</div>
                    <div>
                        <div class="font-bold text-lg">Github Profilim</div>
                        <div class="text-sm text-gray-500">Kod dünyasındaki izlerim</div>
                    </div>
                </div>
            </a>
            
            <a href="https://www.linkedin.com/in/ayliz-azaklı-74579b318/" target="_blank" class="link-card">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-pink-500/20 rounded-xl text-pink-400">📜</div>
                    <div>
                        <div class="font-bold text-lg">LinkedIn</div>
                        <div class="text-sm text-gray-500">Başarılar ve yetkinlikler</div>
                    </div>
                </div>
            </a>
        </div>
        
        <button class="w-full mt-8 py-3 text-gray-400 font-bold hover:text-white transition" onclick="closeModal()">Pencereyi Kapat</button>
    </div>

    <script>
        function openModal() {
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>

</body>

</html>
